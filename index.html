<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ozi Shop | Premium Store</title>
    <!-- Scriptul EmailJS - Încărcat PRIORITAR -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net"></script>
    <style>
        :root {
            --primary: #25d366; --danger: #e74c3c; --dark-bg: #0b0b0b;
            --card-bg: #161616; --text: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark-bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }
        
        /* SOCIAL & TOP BAR */
        .sticky-social { position: fixed; top: 50%; transform: translateY(-50%); left: 0; z-index: 2000; display: flex; flex-direction: column; }
        .social-tag { width: 45px; height: 45px; display: flex; align-items: center; padding-left: 12px; color: white; text-decoration: none; font-weight: bold; transition: 0.3s; overflow: hidden; border-radius: 0 5px 5px 0; margin-bottom: 5px; }
        .social-tag:hover { width: 150px; }
        .s-ig { background: #e1306c; } .s-fb { background: #4267B2; }

        .top-bar { background: var(--danger); color: white; text-align: center; padding: 8px; font-size: 0.8rem; font-weight: bold; position: sticky; top: 0; z-index: 1100; }
        nav { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 32px; z-index: 1500; border-bottom: 1px solid #222; }
        .logo { font-size: 1.6rem; font-weight: bold; color: var(--primary); text-decoration: none; cursor: pointer; }
        
        .cart-trigger { background: none; border: none; color: white; font-size: 1.4rem; cursor: pointer; position: relative; }
        .cart-count { position: absolute; top: -8px; right: -10px; background: var(--primary); color: black; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; font-weight: bold; }

        /* GRID PRODUSE */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .p-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #333; text-align: center; padding-bottom: 20px; transition: 0.3s; }
        .p-card:hover { border-color: var(--primary); }
        .p-img { height: 250px; background: #000; display: flex; align-items: center; justify-content: center; }
        .p-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .thumbs { display: flex; justify-content: center; gap: 8px; padding: 10px; background: #111; }
        .thumbs img { width: 40px; height: 40px; cursor: pointer; border: 1px solid #333; border-radius: 4px; }
        .btn-add { background: var(--primary); color: black; border: none; padding: 12px; width: 85%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; }

        /* MODAL COȘ */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; padding: 20px; overflow-y: auto; }
        .modal-content { max-width: 450px; margin: 40px auto; background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid var(--primary); position: relative; }
        .close-modal { position: absolute; right: 20px; top: 15px; color: var(--danger); font-size: 2rem; cursor: pointer; }
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 10px 0; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="sticky-social">
    <a href="#" class="social-tag s-ig">📸 <span>Instagram</span></a>
    <a href="#" class="social-tag s-fb">f <span>Facebook</span></a>
</div>

<div class="top-bar">🚚 LIVRARE RAPIDĂ - PLATĂ RAMBURS</div>

<nav>
    <div class="logo" onclick="location.reload()">OZI SHOP</div>
    <button class="cart-trigger" id="btnDeschideCos">🛒 <span class="cart-count" id="numarProduse">0</span></button>
</nav>

<div class="container">
    <!-- Produs 1 -->
    <div class="p-card">
        <div class="p-img"><img src="imagini/cooler-fata.avif" id="viewPrincipal1"></div>
        <div class="thumbs">
            <img src="imagini/cooler-fata.avif" onclick="document.getElementById('viewPrincipal1').src='imagini/cooler-fata.avif'">
            <img src="imagini/cooler-spate.avif" onclick="document.getElementById('viewPrincipal1').src='imagini/cooler-spate.avif'">
        </div>
        <h3>Cooler RGB Pro</h3>
        <p style="color:var(--primary); font-weight:bold; font-size:1.3rem;">125 RON</p>
        <button class="btn-add" onclick="adaugaProdus('Cooler RGB Pro', 125)">Adaugă în Coș</button>
    </div>
</div>

<!-- Modal Coș -->
<div id="ecranCos" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="btnInchideCos">&times;</span>
        <h2 style="color:var(--primary)">Finalizare Comandă</h2>
        <div id="listaProduseCos"></div>
        <h3 id="afisajTotal" style="margin-top:20px; border-top:1px solid #333; padding-top:10px;">Total: 0 RON</h3>
        
        <form id="formFinal">
            <input type="text" id="nume" placeholder="Nume Complet" required>
            <input type="tel" id="telefon" placeholder="Telefon" required>
            <input type="text" id="adresa" placeholder="Adresa de livrare" required>
            <button type="submit" class="btn-add" style="width:100%; background:white; color:black; margin-top:15px;">TRIMITE COMANDA</button>
        </form>
    </div>
</div>

<script>
    // === CONFIGURARE (AICI PUI CHEILE TALE) ===
    const CHEIE_PUBLICA = "cOOSvCrSgAYqSrpDP"; 
    const SERVICE_ID = "service_wtcgsi9";
    const TEMPLATE_ID = "";
    // ==========================================

    (function() { emailjs.init(CHEIE_PUBLICA); })();

    let cosCurent = [];

    function adaugaProdus(nume, pret) {
        cosCurent.push({ nume, pret });
        document.getElementById('numarProduse').innerText = cosCurent.length;
        afiseazaCos();
        alert(nume + " a fost adăugat!");
    }

    function afiseazaCos() {
        const container = document.getElementById('listaProduseCos');
        let suma = 0;
        container.innerHTML = cosCurent.map(item => {
            suma += item.pret;
            return `<div class="cart-item"><span>${item.nume}</span><span>${item.pret} RON</span></div>`;
        }).join('');
        document.getElementById('afisajTotal').innerText = "Total: " + suma + " RON";
    }

    // Deschidere/Inchidere
    const modal = document.getElementById('ecranCos');
    document.getElementById('btnDeschideCos').onclick = () => modal.style.display = 'block';
    document.getElementById('btnInchideCos').onclick = () => modal.style.display = 'none';

    // Trimitere Date
    document.getElementById('formFinal').onsubmit = function(e) {
        e.preventDefault();
        if(cosCurent.length === 0) return alert("Coșul e gol!");

        const btn = e.target.querySelector('button');
        btn.innerText = "Se trimite...";
        btn.disabled = true;

        const dateComanda = {
            from_name: document.getElementById('nume').value,
            phone: document.getElementById('telefon').value,
            address: document.getElementById('adresa').value,
            order_content: cosCurent.map(p => p.nume + " (" + p.pret + " RON)").join(", "),
            total_price: document.getElementById('afisajTotal').innerText
        };

        emailjs.send(SERVICE_ID, TEMPLATE_ID, dateComanda)
            .then(() => {
                alert("Comanda a ajuns la noi! Mulțumim.");
                cosCurent = [];
                document.getElementById('numarProduse').innerText = "0";
                afiseazaCos();
                modal.style.display = 'none';
                e.target.reset();
            })
            .catch((err) => {
                alert("Eroare! Verifică dacă cheile EmailJS sunt corecte.");
                console.error(err);
            })
            .finally(() => {
                btn.innerText = "TRIMITE COMANDA";
                btn.disabled = false;
            });
    };
</script>

</body>
</html>
