<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ozi Shop | Magazin Online Premium</title>
    <!-- Previne erorile de trimitere de pe GitHub -->
    <meta name="referrer" content="origin"> 
    <style>
        :root { --p: #25d366; --d: #e74c3c; --bg: #0b0b0b; --card: #161616; --txt: #fff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--txt); overflow-x: hidden; scroll-behavior: smooth; }
        
        /* NAV & BURGER */
        nav { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .logo { font-size: 1.6rem; font-weight: bold; color: var(--p); text-decoration: none; }
        .nav-links { display: flex; list-style: none; padding: 0; transition: 0.5s; }
        .burger { display: none; cursor: pointer; flex-direction: column; gap: 5px; }
        .burger span { width: 25px; height: 3px; background: var(--p); transition: 0.3s; }

        /* SHOP */
        .container { max-width: 1200px; margin: 40px auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .p-card { background: var(--card); border-radius: 12px; border: 1px solid #333; text-align: center; padding: 20px; transition: 0.3s; }
        .p-card:hover { border-color: var(--p); transform: translateY(-5px); }
        .p-card img { width: 100%; height: 200px; object-fit: contain; }
        .btn { background: var(--p); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; box-sizing: border-box; }
        .modal-content { max-width: 500px; margin: auto; background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid var(--p); }
        .form-group { margin-bottom: 15px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }

        /* ANIMATIE X BURGER */
        .toggle .line1 { transform: rotate(-45deg) translate(-5px, 6px); }
        .toggle .line2 { opacity: 0; }
        .toggle .line3 { transform: rotate(45deg) translate(-5px, -6px); }

        @media (max-width: 768px) {
            .burger { display: flex; }
            .nav-links { position: fixed; right: -100%; top: 60px; background: #000; width: 100%; height: 100vh; flex-direction: column; align-items: center; padding-top: 40px; }
            .nav-links.active { right: 0; }
        }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">OZI SHOP</a>
    <div style="display: flex; align-items: center; gap: 15px;">
        <button onclick="openCart()" style="background:none; border:none; color:white; font-size: 1.5rem; cursor:pointer;">🛒 <span id="count">0</span></button>
        <div class="burger" id="burger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    </div>
    <ul class="nav-links" id="menu">
        <li><a onclick="location.reload()" style="cursor:pointer; color:white; text-decoration:none;">Acasă</a></li>
        <li><a href="https://wa.me" style="color:white; text-decoration:none;">WhatsApp</a></li>
    </ul>
</nav>

<div class="container">
    <!-- Produs 1 -->
    <div class="p-card">
        <img src="imagini/cooler-fata.avif" alt="Cooler">
        <h3>Cooler Gaming RGB</h3>
        <span style="color:var(--p); font-weight:bold;">125 RON</span>
        <button class="btn" onclick="add('Cooler RGB', 125)">Adaugă în Coș</button>
    </div>
    <!-- Produs 2 -->
    <div class="p-card">
        <img src="https://images.unsplash.com" alt="Adidasi">
        <h3>Adidași Sport Red</h3>
        <span style="color:var(--p); font-weight:bold;">210 RON</span>
        <button class="btn" onclick="add('Adidasi Sport', 210)">Adaugă în Coș</button>
    </div>
</div>

<div id="cartModal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--p); margin-top:0;">Finalizează Comanda</h2>
        <div id="summary" style="background:#222; padding:10px; margin-bottom:15px; border-radius:5px; font-size:0.9rem;"></div>
        
        <form id="orderForm">
            <div class="form-group"><input type="text" id="nume" placeholder="Nume Complet" required></div>
            <div class="form-group"><input type="tel" id="tel" placeholder="Telefon" required></div>
            <div class="form-group"><textarea id="adr" placeholder="Adresa Livrare" required></textarea></div>
            <button type="submit" id="submitBtn" class="btn" style="background:var(--d)">TRIMITE COMANDA</button>
            <button type="button" onclick="openCart()" style="background:none; border:none; color:#777; margin-top:10px; cursor:pointer; width:100%;">Anulează</button>
        </form>
        <div id="status" style="margin-top:10px; font-weight:bold; text-align:center;"></div>
    </div>
</div>

<script>
    let cart = [];
    function toggleMenu() { 
        document.getElementById('menu').classList.toggle('active'); 
        document.getElementById('burger').classList.toggle('toggle');
    }
    
    function add(n, p) { cart.push({n, p}); document.getElementById('count').innerText = cart.length; alert("Adăugat!"); }

    function openCart() {
        const m = document.getElementById('cartModal');
        if (cart.length === 0) { alert("Coșul este gol!"); return; }
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        let t = 0; let s = ""; cart.forEach(i => { t += i.p; s += i.n + ", "; });
        document.getElementById('summary').innerHTML = `Produse: ${s}<br><b>Total: ${t} RON</b>`;
    }

    // FIX PENTRU ERORILE GITHUB PAGES (AJAX FETCH)
    const form = document.getElementById("orderForm");
    form.addEventListener("submit", async function(e) {
        e.preventDefault();
        const status = document.getElementById("status");
        const btn = document.getElementById("submitBtn");
        
        btn.innerText = "Se trimite...";
        btn.disabled = true;

        let t = 0; let s = ""; cart.forEach(i => { t += i.p; s += i.n + ", "; });
        
        const data = {
            Nume: document.getElementById("nume").value,
            Telefon: document.getElementById("tel").value,
            Adresa: document.getElementById("adr").value,
            Produse: s,
            Total: t + " RON"
        };

        try {
            const response = await fetch("https://formspree.io", {
                method: "POST",
                body: JSON.stringify(data),
                headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }
            });

            if (response.ok) {
                status.innerHTML = "✅ Comandă trimisă cu succes!";
                status.style.color = "#25d366";
                form.reset(); cart = []; document.getElementById('count').innerText = "0";
                setTimeout(() => { location.reload(); }, 3000);
            } else {
                throw new Error();
            }
        } catch (error) {
            status.innerHTML = "❌ Eroare. Încearcă pe WhatsApp.";
            status.style.color = "#e74c3c";
            btn.disabled = false;
            btn.innerText = "TRIMITE COMANDA";
        }
    });
</script>
</body>
</html>
