<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ozi Shop | Premium Store</title>
    <meta name="description" content="Magazin online premium cu livrare rapidă și plată ramburs.">
    
    <style>
        :root {
            --primary: #25d366; --danger: #e74c3c; --dark-bg: #0b0b0b;
            --card-bg: #161616; --text: #ffffff; --border: #222;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; background: var(--dark-bg); color: var(--text); 
            line-height: 1.6; overflow-x: hidden; scroll-behavior: smooth;
        }

        /* Navigație Optimizată */
        .top-bar { background: var(--danger); text-align: center; padding: 8px; font-size: 0.75rem; font-weight: bold; position: sticky; top: 0; z-index: 2000; }
        nav { 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            padding: 10px 5%; display: flex; justify-content: space-between; 
            align-items: center; position: sticky; top: 31px; z-index: 1500; border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--primary); text-decoration: none; letter-spacing: -1px; }

        /* Grid Produse */
        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; padding: 20px 5%; max-width: 1300px; margin: 0 auto;
        }
        .p-card { 
            background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); 
            padding-bottom: 20px; transition: transform 0.3s ease; overflow: hidden;
        }
        .p-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .p-img { width: 100%; height: 250px; object-fit: cover; background: #000; }
        
        .thumbs { display: flex; gap: 5px; justify-content: center; padding: 10px; }
        .thumbs img { width: 40px; height: 40px; cursor: pointer; border-radius: 4px; border: 1px solid #333; opacity: 0.6; transition: 0.2s; }
        .thumbs img:hover { opacity: 1; border-color: var(--primary); }

        .btn-add { 
            background: var(--primary); color: #000; border: none; padding: 12px 25px; 
            border-radius: 6px; font-weight: bold; cursor: pointer; width: 90%; margin: 10px auto; display: block;
            transition: 0.2s;
        }
        .btn-add:active { transform: scale(0.95); }

        /* Utilitare */
        .badge-count { background: var(--primary); color: #000; padding: 2px 6px; border-radius: 10px; font-size: 12px; margin-left: 5px; }
        .whatsapp-btn { position: fixed; bottom: 20px; right: 20px; background: var(--primary); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 4px 15px rgba(37,211,102,0.4); z-index: 999; }

        @media (max-width: 768px) {
            .nav-links { display: none; } /* De implementat burger-ul via JS */
        }
    </style>
</head>
<body>

<div class="top-bar">LIVRARE ÎN 24H - PLATĂ LA RECEPȚIE</div>

<nav>
    <a href="/" class="logo">OZI SHOP</a>
    <div class="nav-actions">
        <button class="cart-trigger" aria-label="Coș de cumpărături" style="background:none; border:none; color:white; cursor:pointer; font-size:1.2rem;">
            🛒<span class="badge-count" id="cart-count">0</span>
        </button>
    </div>
</nav>

<main>
    <section id="electronice">
        <h2 style="text-align:center; margin: 40px 0;">ELECTRONICE</h2>
        <div class="container">
            <!-- Produs Optimizat -->
            <article class="p-card">
                <img src="imagini/cooler-fata.avif" alt="Cooler Gaming RGB" class="p-img" id="main-img-1" loading="lazy">
                <div class="thumbs">
                    <img src="imagini/cooler-fata.avif" alt="view 1" onclick="changeImg('main-img-1', this.src)">
                    <img src="imagini/cooler-spate.avif" alt="view 2" onclick="changeImg('main-img-1', this.src)">
                </div>
                <div style="padding:15px;">
                    <h3>Cooler Gaming Pro</h3>
                    <p style="color:var(--primary); font-size:1.4rem; font-weight:bold; margin:10px 0;">125 RON</p>
                    <button class="btn-add" onclick="updateCart(1)">ADAUGA IN COS</button>
                </div>
            </article>
        </div>
    </section>
</main>

<a href="https://wa.me" class="whatsapp-btn" aria-label="Contact WhatsApp">
    <svg width="30" height="30" fill="white" viewBox="0 0 24 24"><path d="M12.031 6.172c-2.28 0-4.13 1.85-4.13 4.13 0 .741.196 1.435.538 2.033l-.573 2.091 2.141-.561c.59.324 1.264.512 1.982.512 2.28 0 4.13-1.85 4.13-4.13s-1.85-4.13-4.13-4.13zm0-1.262c2.978 0 5.393 2.415 5.393 5.392 0 1.25-.425 2.401-1.141 3.313l.74 2.698-2.768-.725c-.917.653-2.037 1.04-3.245 1.04-2.978 0-5.392-2.415-5.392-5.392s2.414-5.392 5.392-5.392z"/></svg>
</a>

<script>
    // Logică simplificată și rapidă
    let count = 0;
    const cartCountEl = document.getElementById('cart-count');

    function updateCart(val) {
        count += val;
        cartCountEl.innerText = count;
        cartCountEl.style.transform = "scale(1.2)";
        setTimeout(() => cartCountEl.style.transform = "scale(1)", 200);
    }

    function changeImg(id, src) {
        document.getElementById(id).src = src;
    }

    // Intersection Observer pentru animații la scroll (Optimizare performanță)
    const cards = document.querySelectorAll('.p-card');
    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if(entry.isIntersecting) {
                entry.target.style.opacity = 1;
                entry.target.style.transform = "translateY(0)";
            }
        });
    }, { threshold: 0.1 });

    cards.forEach(card => {
        card.style.opacity = 0;
        card.style.transform = "translateY(20px)";
        card.style.transition = "all 0.6s ease-out";
        observer.observe(card);
    });
</script>

</body>
</html>
