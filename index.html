<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ozi Shop | Premium Store</title>
    
    <!-- LINK-UL MAGIC PENTRU ICONIȚE (FONT AWESOME 6.4.0) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    
    <style>
        :root {
            --primary: #25d366; --danger: #e74c3c; --dark-bg: #0b0b0b;
            --card-bg: #161616; --text-main: #ffffff;
            --insta-color: #E1306C; /* Roz Instagram */
            --fb-color: #1877F2;    /* Albastru Facebook */
            --wa-color: #25D366;    /* Verde WhatsApp */
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark-bg); color: var(--text-main); scroll-behavior: smooth; }

        /* BARA SOCIALĂ STÂNGA CU ICONIȚE COLORATE */
        .sticky-social { position: fixed; top: 50%; transform: translateY(-50%); left: 0; z-index: 2000; display: flex; flex-direction: column; }
        .social-tag { width: 50px; height: 50px; display: flex; align-items: center; justify-content: flex-start; padding-left: 15px; color: white; text-decoration: none; transition: 0.3s; border-radius: 0 8px 8px 0; margin-bottom: 5px; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .social-tag:hover { width: 220px; }
        .social-tag i { font-size: 20px; min-width: 25px; text-align: center; }
        .social-tag span { margin-left: 15px; opacity: 0; white-space: nowrap; font-weight: bold; }
        .social-tag:hover span { opacity: 1; }

        /* CULORI DEDICATE */
        .s-ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .s-fb { background: var(--fb-color); }
        .s-wa { background: var(--wa-color); }

        /* NAVIGAȚIE */
        .top-bar { background: var(--danger); color: white; text-align: center; padding: 10px; font-size: 0.8rem; font-weight: bold; position: sticky; top: 0; z-index: 1100; }
        nav { background: rgba(0,0,0,0.9); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 40px; z-index: 1000; border-bottom: 1px solid #222; }
        .logo { font-size: 1.8rem; font-weight: 900; color: #fff; text-decoration: none; }
        .logo span { color: var(--primary); }

        /* CARDS */
        .container { max-width: 1200px; margin: 40px auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .product-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid #333; transition: 0.3s; text-align: center; padding-bottom: 20px; }
        .product-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .product-img { height: 300px; background: #000; }
        .product-img img { width: 100%; height: 100%; object-fit: contain; }

        /* BUTON WHATSAPP DEDICAT */
        .btn-wa { background: var(--wa-color); color: #000; text-decoration: none; padding: 15px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; gap: 10px; margin: 0 20px; transition: 0.3s; }
        .btn-wa:hover { background: #fff; }
        .btn-wa i { font-size: 1.2rem; }

        /* WHATSAPP FLOAT */
        .wa-float { position: fixed; width: 60px; height: 60px; bottom: 30px; right: 30px; background: var(--wa-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 2000; text-decoration: none; box-shadow: 0 5px 20px rgba(0,0,0,0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0% {box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7);} 70% {box-shadow: 0 0 0 15px rgba(37, 211, 102, 0);} 100% {box-shadow: 0 0 0 0 rgba(37, 211, 102, 0);} }
    </style>
</head>
<body>

    <div style="font-size: 1.5rem; display: flex; justify-content: center; gap: 30px; margin-top: 20px;">

</html>
