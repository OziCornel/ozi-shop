<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ozi Shop | Premium Experience</title>
    
    <!-- Meta SEO & Performance -->
    <meta name="description" content="Magazin premium cu livrare rapidă.">
    <script src="https://cdn.jsdelivr.net"></script>
    
    <style>
        :root {
            --primary: #25d366; --danger: #ff4757; --dark: #0b0b0b;
            --card: #1a1a1a; --text: #ffffff; --gray: #888;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); color: var(--text); margin: 0; scroll-behavior: smooth; }

        /* HEADER & NAV */
        nav { 
            position: sticky; top: 0; background: rgba(0,0,0,0.95); 
            padding: 15px 5%; display: flex; justify-content: space-between; 
            align-items: center; z-index: 1000; border-bottom: 1px solid #333;
        }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--primary); text-decoration: none; }
        .cart-icon { position: relative; cursor: pointer; font-size: 1.5rem; }
        #cart-count { 
            position: absolute; top: -10px; right: -10px; background: var(--danger); 
            color: white; font-size: 0.7rem; padding: 3px 7px; border-radius: 50%; 
        }

        /* GRID PRODUSE */
        .container { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; padding: 40px 5%; max-width: 1400px; margin: 0 auto;
        }
        .product-card { 
            background: var(--card); border-radius: 15px; overflow: hidden; 
            transition: 0.3s; border: 1px solid #222;
        }
        .product-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .p-img { width: 100%; height: 280px; object-fit: cover; }
        .p-info { padding: 20px; }
        .p-price { font-size: 1.5rem; font-weight: bold; color: var(--primary); margin: 10px 0; }
        
        select { 
            width: 100%; padding: 8px; background: #333; color: white; 
            border: none; border-radius: 5px; margin-bottom: 10px; 
        }

        .btn-add { 
            width: 100%; background: var(--primary); color: #000; border: none; 
            padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        /* MODAL COȘ & CHECKOUT */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            z-index: 2000; overflow-y: auto; padding: 20px;
        }
        .modal-content { 
            max-width: 600px; margin: 40px auto; background: #111; 
            padding: 30px; border-radius: 15px; position: relative; 
        }
        .close { position: absolute; right: 20px; top: 20px; font-size: 2rem; cursor: pointer; color: var(--danger); }

        .cart-item { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #222; padding: 10px 0;
        }
        
        form input { 
            width: 100%; padding: 12px; margin: 10px 0; background: #222; 
            border: 1px solid #444; color: white; border-radius: 5px; 
        }

        .btn-order { 
            width: 100%; background: #fff; color: #000; border: none; 
            padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        /* WHATSAPP */
        .wa-float { 
            position: fixed; bottom: 20px; right: 20px; background: #25d366; 
            width: 60px; height: 60px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 1.8rem; z-index: 1500;
        }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">OZI SHOP</a>
    <div class="cart-icon" onclick="toggleCart()">🛒 <span id="cart-count">0</span></div>
</nav>

<div class="container" id="products-grid">
    <!-- Produs 1 -->
    <div class="product-card">
        <img src="https://images.unsplash.com" alt="Nike Red" class="p-img">
        <div class="p-info">
            <h3>Nike Air Max Red</h3>
            <select id="size-1">
                <option value="38">Mărime: 38</option>
                <option value="40">Mărime: 40</option>
                <option value="42">Mărime: 42</option>
            </select>
            <div class="p-price">450 RON</div>
            <button class="btn-add" onclick="addToCart('Nike Air Max Red', 450, 'size-1')">ADĂUGĂ ÎN COȘ</button>
        </div>
    </div>
    <!-- Produs 2 -->
    <div class="product-card">
        <img src="https://images.unsplash.com" alt="Căști" class="p-img">
        <div class="p-info">
            <h3>Căști Sony WH</h3>
            <div class="p-price">1200 RON</div>
            <button class="btn-add" onclick="addToCart('Căști Sony WH', 1200)">ADĂUGĂ ÎN COȘ</button>
        </div>
    </div>
</div>

<!-- Modal Coș -->
<div id="cart-modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="toggleCart()">&times;</span>
        <h2>Coșul tău</h2>
        <div id="cart-items-list"></div>
        <hr>
        <h3 id="cart-total">Total: 0 RON</h3>
        
        <h3>Detalii Livrare</h3>
        <form id="order-form">
            <input type="text" id="name" placeholder="Nume Complet" required>
            <input type="tel" id="phone" placeholder="Număr Telefon" required>
            <input type="text" id="address" placeholder="Adresă Completă" required>
            <button type="submit" class="btn-order">FINALIZEAZĂ COMANDA</button>
        </form>
    </div>
</div>

<a href="https://wa.me" class="wa-float">🟢</a>

<script>
    // Configurare EmailJS (Înlocuiește cu datele tale)
    (function() {
        emailjs.init("YOUR_PUBLIC_KEY");
    })();

    let cart = JSON.parse(localStorage.getItem('ozi_cart')) || [];

    function addToCart(name, price, sizeId = null) {
        const size = sizeId ? document.getElementById(sizeId).value : 'N/A';
        cart.push({ name, price, size });
        updateUI();
        alert(`${name} a fost adăugat în coș!`);
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateUI();
    }

    function updateUI() {
        localStorage.setItem('ozi_cart', JSON.stringify(cart));
        document.getElementById('cart-count').innerText = cart.length;
        
        const list = document.getElementById('cart-items-list');
        let total = 0;
        list.innerHTML = cart.map((item, index) => {
            total += item.price;
            return `
                <div class="cart-item">
                    <div>
                        <strong>${item.name}</strong><br>
                        <small>Mărime: ${item.size}</small>
                    </div>
                    <div>
                        <span>${item.price} RON</span>
                        <button onclick="removeFromCart(${index})" style="background:none; border:none; color:red; cursor:pointer; margin-left:10px;">✖</button>
                    </div>
                </div>`;
        }).join('');
        
        document.getElementById('cart-total').innerText = `Total: ${total} RON`;
    }

    function toggleCart() {
        const modal = document.getElementById('cart-modal');
        modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
    }

    // Gestionare Comandă
    document.getElementById('order-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        if(cart.length === 0) return alert("Coșul este gol!");

        const btn = e.target.querySelector('button');
        btn.innerText = "Se trimite...";
        btn.disabled = true;

        const orderDetails = cart.map(i => `${i.name} (Marime: ${i.size}) - ${i.price} RON`).join('\n');
        const total = cart.reduce((a, b) => a + b.price, 0);

        const templateParams = {
            from_name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            address: document.getElementById('address').value,
            order_content: orderDetails,
            total_price: total + " RON"
        };

        // Trimitere Email prin EmailJS
        emailjs.send('cOOSvCrSgAYqSrpDP', 'service_wtcgsi9', templateParams)
            .then(() => {
                alert("Comandă trimisă cu succes! Te vom contacta în curând.");
                cart = [];
                updateUI();
                toggleCart();
                e.target.reset();
            }, (err) => {
                alert("Eroare la trimitere: " + JSON.stringify(err));
            })
            .finally(() => {
                btn.innerText = "FINALIZEAZĂ COMANDA";
                btn.disabled = false;
            });
    });

    // Inițializare interfață
    updateUI();
</script>

</body>
</html>
